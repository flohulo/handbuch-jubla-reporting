site_name: Jubla Reporting – Handbuch
site_description: Offizielle Dokumentation für das Jubla Reporting Tool
site_url: https://handbuch-jubla-reporting.readthedocs.io
repo_url: https://github.com/flohulo/jubla-reporting
repo_name: flohulo/jubla-reporting
edit_uri: ""

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Startseite: index.md
  - Einrichtung:
    - Überblick: einrichtung/ueberblick.md
    - 1. Repository forken: einrichtung/fork.md
    - 2. Google Sheets einrichten: einrichtung/google-sheets.md
    - 3. Netlify verbinden: einrichtung/netlify.md
    - 4. Umgebungsvariablen: einrichtung/umgebungsvariablen.md
    - 5. Branding & Konfiguration: einrichtung/branding.md
  - Nutzung:
    - Für Leitende: nutzung/leitende.md
    - Für die Scharleitung: nutzung/scharleitung.md
    - Alarm-Funktion: nutzung/alarm.md
  - Entwicklung:
    - Architektur: entwicklung/architektur.md
    - Contributing: entwicklung/contributing.md
    - Changelog: entwicklung/changelog.md
  - Rechtliches:
    - Datenschutz & Lizenz: rechtliches.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: de

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/flohulo/jubla-reporting
      name: jubla-reporting auf GitHub
  generator: false

copyright: "Entwickelt mit ❤️ von Leitern für die Jubla · GPL-3.0 License"
