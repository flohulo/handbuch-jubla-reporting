site_name: Jubla Reporting – Handbuch
site_description: Offizielles Handbuch für das Jubla Reporting Tool
site_url: https://jubla-reporting.readthedocs.io
repo_url: https://github.com/flohulo/jubla-reporting
repo_name: flohulo/jubla-reporting
edit_uri: ""

theme:
  name: material
  language: de
  palette:
    - scheme: default
      primary: deep blue
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Dunkelmodus aktivieren
    - scheme: slate
      primary: deep orange
      accent: orange
      toggle:
        icon: material/brightness-4
        name: Hellmodus aktivieren
  font:
    text: Roboto
    code: Roboto Mono
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - content.code.copy
  icon:
    repo: fontawesome/brands/github

nav:
  - Startseite: index.md
  - Für Nutzende:
      - Nutzung für Leitende: nutzung/leitende.md
      - Nutzung für die Scharleitung: nutzung/scharleitung.md
      - Alarm-Funktion: nutzung/alarm.md
  - Für Entwickler:innen:
      - Einstieg: admin/ueberblick.md
      - Architektur: entwicklung/architektur.md
      - constibutions: entwicklung/contributions.md
  - Rechtliches:
      - Datenschutz & Lizenz: rechtliches.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search:
      lang: de

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/flohulo/jubla-reporting
      name: jubla-reporting auf GitHub
  generator: false

copyright: "Entwickelt mit ❤️ von Leitern für die Jubla · GPL-3.0 License"
